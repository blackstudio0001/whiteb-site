<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>White</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; cursor: none !important; }
body, html { width: 100%; height: 100%; overflow: hidden; }

.site {
  width: 100vw; height: 100vh;
  background: #0d0d0f;
  position: relative;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
  font-family: 'Segoe UI', system-ui, sans-serif;
}

canvas#bg-rain {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0; pointer-events: none;
}

.bg-glow {
  position: absolute; inset: 0; z-index: 1;
  background: radial-gradient(ellipse at 50% 40%, rgba(160,160,170,0.07) 0%, transparent 60%);
  pointer-events: none;
}

.card {
  position: relative; z-index: 10;
  width: 400px;
  background: rgba(18,18,22,0.58);
  backdrop-filter: blur(32px) saturate(1.3);
  -webkit-backdrop-filter: blur(32px) saturate(1.3);
  border-radius: 22px;
  border: 1px solid rgba(200,200,210,0.13);
  padding: 46px 34px 38px;
  display: flex; flex-direction: column; align-items: center;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.04) inset,
    0 8px 60px rgba(0,0,0,0.75),
    0 0 100px rgba(160,160,170,0.04);
}

.corner {
  position: absolute; width: 16px; height: 16px;
  border-color: rgba(200,200,210,0.32); border-style: solid;
}
.c-tl { top: 10px; left: 10px; border-width: 1px 0 0 1px; border-radius: 4px 0 0 0; }
.c-tr { top: 10px; right: 10px; border-width: 1px 1px 0 0; border-radius: 0 4px 0 0; }
.c-bl { bottom: 10px; left: 10px; border-width: 0 0 1px 1px; border-radius: 0 0 0 4px; }
.c-br { bottom: 10px; right: 10px; border-width: 0 1px 1px 0; border-radius: 0 0 4px 0; }

.avatar-wrap { margin-bottom: 20px; }
.avatar-ring {
  width: 118px; height: 118px; border-radius: 50%; padding: 3px;
  background: linear-gradient(135deg, #3a3a3a, #aaa, #eee, #888, #3a3a3a);
  background-size: 400% 400%;
  animation: ag 4s linear infinite;
  box-shadow: 0 0 30px rgba(200,200,210,0.22), 0 0 70px rgba(150,150,160,0.09);
}
@keyframes ag {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
.avatar-ring img {
  width: 100%; height: 100%; border-radius: 50%; display: block;
  border: 2.5px solid #0d0d0f;
}

.name-main {
  font-size: 32px; font-weight: 800; letter-spacing: 9px;
  color: #f0f0f2; text-align: center;
  text-shadow: 0 0 24px rgba(230,230,240,0.5), 0 0 60px rgba(180,180,190,0.2);
  text-transform: uppercase; margin-bottom: 4px;
}
.name-sub {
  font-size: 9.5px; letter-spacing: 2.5px;
  color: #666; text-transform: uppercase; text-align: center;
}

.divider {
  width: 200px; height: 1px; margin: 16px auto;
  background: linear-gradient(90deg, transparent, #444, #bbb, #444, transparent);
  box-shadow: 0 0 6px rgba(180,180,190,0.15);
}

.tag-row {
  display: flex; gap: 7px; margin-bottom: 18px;
  flex-wrap: wrap; justify-content: center;
}
.tag {
  font-size: 8.5px; letter-spacing: 2px; font-weight: 700;
  padding: 4px 14px; border-radius: 20px; text-transform: uppercase;
}
.t1 { background: rgba(180,180,185,0.08); color: #aaa; border: 1px solid rgba(180,180,185,0.22); }
.t2 { background: rgba(255,255,255,0.05); color: #d0d0d0; border: 1px solid rgba(255,255,255,0.12); }

.quote {
  text-align: center; max-width: 290px;
  font-size: 13px; line-height: 1.85;
  color: #777; margin-bottom: 26px; font-style: italic;
}
.quote em { color: #ddd; font-style: normal; font-weight: 600; }

.steam-btn {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 24px; border-radius: 11px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(200,200,210,0.15);
  text-decoration: none; cursor: none;
  transition: all 0.25s;
  box-shadow: 0 0 10px rgba(200,200,210,0.05), inset 0 1px 0 rgba(255,255,255,0.05);
}
.steam-btn:hover {
  border-color: rgba(200,200,210,0.45);
  background: rgba(255,255,255,0.07);
  box-shadow: 0 0 24px rgba(200,200,210,0.14);
  transform: translateY(-2px);
}
.steam-text {
  font-size: 10px; color: #bbb;
  letter-spacing: 2px; font-weight: 700; text-transform: uppercase;
}
</style>
</head>
<body>

<div class="site">

    <div class="avatar-wrap">

        <path fill="#aaa" d="M496 256c0 137-111.2 248-248.4 248-113.8 0-209.7-76.3-239-180.4l95.2 39.3c6.4 32.1 34.9 56.4 68.9 56.4 39.2 0 71.9-32.4 70.2-73.5l84.5-60.2c52.1 1.3 95.8-40.9 95.8-93.5 0-51.6-42-93.5-93.7-93.5s-93.7 41.9-93.7 93.5v1.2L176.6 279c-15.5-.9-30.7 3.4-43.5 12.1L0 236.1C10.2 108.4 117.1 8 248 8c137.2 0 248 111 248 248zm-166.9-194.7c-36.5 0-66.3 29.7-66.3 66.2s29.8 66.2 66.3 66.2 66.3-29.7 66.3-66.2-29.7-66.2-66.3-66.2zm0 22.1c24.4 0 44.2 19.7 44.2 44.1s-19.8 44.1-44.2 44.1-44.2-19.7-44.2-44.1 19.8-44.1 44.2-44.1zM193.5 374.9c-19.7 19.6-51.5 19.6-71.2 0l-22.9-9.5c10.5 19.5 30.9 32.8 54.4 32.8 34.3 0 62.1-27.8 62.1-62s-27.8-62-62.1-62c-2.3 0-4.6.1-6.8.4l32.5 13.4c19.7 19.6 19.7 51.4 0 71z"/>
      </svg>
      <span class="steam-text">Steam Profile</span>

  </div>
</div>

<!-- Rain -->
<script>
(function () {
  const canvas = document.getElementById('bg-rain');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const drops = Array.from({ length: 220 }, () => ({
    x:     Math.random() * canvas.width,
    y:     Math.random() * canvas.height,
    len:   12 + Math.random() * 28,
    speed: 2  + Math.random() * 5,
    op:    0.04 + Math.random() * 0.14,
    w:     0.4  + Math.random() * 0.7
  }));

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drops.forEach(function (d) {
      var g = ctx.createLinearGradient(d.x, d.y, d.x - d.len * 0.08, d.y + d.len);
      g.addColorStop(0, 'rgba(200,200,210,0)');
      g.addColorStop(1, 'rgba(200,200,210,' + d.op + ')');
      ctx.beginPath();
      ctx.moveTo(d.x, d.y);
      ctx.lineTo(d.x - d.len * 0.08, d.y + d.len);
      ctx.strokeStyle = g;
      ctx.lineWidth   = d.w;
      ctx.stroke();
      d.y += d.speed;
      if (d.y > canvas.height + 40) {
        d.y = -40;
        d.x = Math.random() * canvas.width;
      }
    });
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>

<!-- Music -->
<script>
(function () {
  var audio = new Audio('FRIENDLY_THUG_52_NGG_-_Lost_Angeles_76929092.mp3');
  audio.loop   = true;
  audio.volume = 0.6;

  function tryPlay() {
    audio.play().catch(function () {});
    document.removeEventListener('click',      tryPlay);
    document.removeEventListener('keydown',    tryPlay);
    document.removeEventListener('touchstart', tryPlay);
  }

  audio.play().catch(function () {
    document.addEventListener('click',      tryPlay);
    document.addEventListener('keydown',    tryPlay);
    document.addEventListener('touchstart', tryPlay);
  });
})();
</script>

<!-- Cursor -->
<script>
(function () {
  const canvas = document.createElement('canvas');
  canvas.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;';
  document.body.appendChild(canvas);
  const ctx = canvas.getContext('2d');

  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);

  let mx = -999, my = -999;
  const trail = [];
  const ripples = [];

  document.addEventListener('mousemove', function (e) { mx = e.clientX; my = e.clientY; });
  document.addEventListener('click', function (e) {
    ripples.push({ x: e.clientX, y: e.clientY, r: 0, op: 0.7 });
  });

  function frame() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    trail.push({ x: mx, y: my, life: 1 });
    if (trail.length > 28) trail.shift();

    trail.forEach(function (p, i) {
      p.life -= 0.04;
      var size = (i / trail.length) * 5;
      ctx.beginPath();
      ctx.arc(p.x, p.y, Math.max(0.1, size), 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(200,200,210,' + (p.life * 0.35) + ')';
      ctx.fill();
    });

    ripples.forEach(function (r, i) {
      r.r += 4;
      r.op -= 0.025;
      ctx.beginPath();
      ctx.arc(r.x, r.y, r.r, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(200,200,210,' + r.op + ')';
      ctx.lineWidth = 0.8;
      ctx.stroke();
      if (r.op <= 0) ripples.splice(i, 1);
    });

    ctx.beginPath();
    ctx.arc(mx, my, 5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(240,240,242,0.85)';
    ctx.fill();

    ctx.beginPath();
    ctx.arc(mx, my, 14, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(200,200,210,0.35)';
    ctx.lineWidth = 0.8;
    ctx.stroke();

    requestAnimationFrame(frame);
  }
  frame();
})();
</script>
